<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Carousel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #faf9f7;
}

/* title */
.carousel-title {
  text-align: center;
  font-size: 24px;
  margin: 30px 0;
}

/* track */
.carousel-track {
  display: flex;
  gap: 16px;
  padding: 20px;

  overflow-x: auto;
  scroll-snap-type: x mandatory;

  cursor: grab; /* مهم */
}

/* drag effect */
.carousel-track:active {
  cursor: grabbing;
}

/* slides */
.slide {
  flex: 0 0 320px;
  scroll-snap-align: start;
}

/* images */
.slide img {
  width: 100%;
  border-radius: 16px;
  display: block;
}

/* hide scrollbar */
.carousel-track::-webkit-scrollbar {
  display: none;
}
  </style>

</head>

<body>

  <h2 class="carousel-title">See It In Real Life</h2>

  <div class="carousel-track">

    <div class="slide">
      <img src="https://res.cloudinary.com/dvnfuy27n/image/upload/v1775082818/1_p47kpv.jpg">
    </div>

    <div class="slide">
      <img src="https://res.cloudinary.com/dvnfuy27n/image/upload/v1775082820/2_aot3yr.jpg">
    </div>

    <div class="slide">
      <img src="https://res.cloudinary.com/dvnfuy27n/image/upload/v1775082823/3_ne1tl1.jpg">
    </div>

  </div>

</body>
</html>
