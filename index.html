<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carousel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
   /* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #faf9f7;
}

/* ===== TITLE ===== */
.carousel-title {
  text-align: center;
  font-size: 22px;
  margin: 20px 0;
  color: white;
}

/* ===== TRACK ===== */
.carousel-track {
  display: flex;
  gap: 16px;
  padding: 20px;

  overflow-x: auto;
  scroll-behavior: smooth;

  cursor: grab;
}

.carousel-track:active {
  cursor: grabbing;
}

/* ===== SLIDE ===== */
.slide {
  flex: 0 0 80%; /* mobile */
}

/* ===== IMAGE ===== */
.slide img {
  width: 100%;
  border-radius: 16px;
  display: block;
}

/* ===== HIDE SCROLLBAR ===== */
.carousel-track::-webkit-scrollbar {
  display: none;
}

/* ===== DESKTOP FIX 🔥 ===== */
@media (min-width: 768px) {
  .slide {
    flex: 0 0 20%; /* أهم تعديل */
  }
}

  </style>
</head>

<body>

  <h2 class="carousel-title">See It In Real Life</h2>

  <div class="carousel-track">

    <div class="slide">
      <img src="https://res.cloudinary.com/dvnfuy27n/image/upload/v1775082818/1_p47kpv.jpg">
    </div>

    <div class="slide">
      <img src="https://res.cloudinary.com/dvnfuy27n/image/upload/v1775082823/3_ne1tl1.jpg">
    </div>

    <div class="slide">
      <img src="https://res.cloudinary.com/dvnfuy27n/image/upload/v1775082820/2_aot3yr.jpg">
    </div>

  </div>

</body>
</html>
